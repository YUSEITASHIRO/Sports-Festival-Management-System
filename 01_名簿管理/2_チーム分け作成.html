<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>チーム分け作成 (修正版)</title>
    <style>
        :root {
            --color-male: #e0f7fa; --border-male: #4dd0e1;
            --color-female: #fce4ec; --border-female: #f06292;
            --color-grade1: #e8f5e9; --border-grade1: #81c784;
            --color-grade-other: #f5f5f5; --border-grade-other: #bdbdbd;
            --color-sports: #fff3e0; --border-sports: #ffb74d;
            --color-festival: #ede7f6; --border-festival: #9575cd;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 95%; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); padding: 30px; }
        h1 { text-align: center; margin-bottom: 30px; font-size: 2.5em; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; padding: 25px; background: #f5f7fa; border-radius: 15px; }
        .button-group { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin: 20px 0; }
        button { padding: 12px 25px; border: none; border-radius: 25px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4); }
        .btn-secondary { background: linear-gradient(135deg, #ffecd2, #fcb69f); color: #333; }
        .btn-secondary:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(252, 182, 159, 0.4); }
        .member-list-container { background: #f8f9fa; padding: 20px; border-radius: 12px; margin: 20px 0; }
        .member-list-container h3, .member-list-container p { text-align: center; margin-bottom: 15px; }
        .members { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .member { display: flex; align-items: center; gap: 6px; padding: 8px; border: 1px solid #dee2e6; border-radius: 8px; background: white; cursor: pointer; transition: all 0.2s ease; user-select: none; }
        .member:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .member-name { font-weight: 600; }
        .member-tags { display: flex; gap: 4px; }
        .tag { font-size: 11px; padding: 2px 6px; border-radius: 10px; border: 1px solid; }
        .tag-male { background-color: var(--color-male); border-color: var(--border-male); }
        .tag-female { background-color: var(--color-female); border-color: var(--border-female); }
        .tag-grade1 { background-color: var(--color-grade1); border-color: var(--border-grade1); }
        .tag-grade-other { background-color: var(--color-grade-other); border-color: var(--border-grade-other); }
        .tag-sports { background-color: var(--color-sports); border-color: var(--border-sports); }
        .tag-festival { background-color: var(--color-festival); border-color: var(--border-festival); }
        .factor-dots { display: flex; gap: 3px; align-items: center; margin-left: 2px; }
        .factor-dot { width: 8px; height: 8px; border-radius: 50%; }
        .factor-dot-0 { background-color: #ef5350; } .factor-dot-1 { background-color: #42a5f5; } .factor-dot-2 { background-color: #66bb6a; } .factor-dot-3 { background-color: #ffa726; } .factor-dot-4 { background-color: #ab47bc; }
        .member.leader-candidate { box-shadow: 0 0 0 3px gold; }
        .member.buddy-candidate { box-shadow: 0 0 0 3px #42a5f5; }
        .member.excluded { opacity: 0.5; background: #eee; text-decoration: line-through; }
        .groups-wrapper { width: 100%; overflow-x: auto; padding-bottom: 15px; }
        #groups { display: flex; flex-wrap: nowrap; gap: 20px; padding: 10px 0; min-height: 300px; }
        .group { flex: 0 0 320px; padding: 15px; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); display: flex; flex-direction: column; transition: background-color 0.3s; }
        .group:nth-child(4n+1) { background: linear-gradient(135deg, #f6d365, #fda085); }
        .group:nth-child(4n+2) { background: linear-gradient(135deg, #a1c4fd, #c2e9fb); }
        .group:nth-child(4n+3) { background: linear-gradient(135deg, #d4fc79, #96e6a1); }
        .group:nth-child(4n+4) { background: linear-gradient(135deg, #ff9a9e, #fecfef); }
        .group h3 { text-align: center; padding: 10px; background: rgba(255,255,255,0.85); border-radius: 10px; font-weight: 700; margin-bottom: 8px; }
        .group-stats { font-size: 0.8em; text-align: center; background: rgba(255,255,255,0.75); border-radius: 8px; padding: 8px; margin-bottom: 10px; line-height: 1.4; }
        .group-members { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        .group-member { background: rgba(255,255,255,0.9); }
        .group-member[draggable="true"] { cursor: grab; }
        .group-member[draggable="true"]:active { cursor: grabbing; }
        .group-member.dragging { opacity: 0.4; }
        .group.drag-over { background: #e0e0e0; }
        .group-member.leader { order: -1; box-shadow: 0 0 0 3px gold; font-weight: bold; position: relative; padding-left: 2em; }
        .group-member.leader::before { content: '👑'; position: absolute; left: 0.5em; top: 50%; transform: translateY(-50%); font-size: 1.2em; }
        .message-box { min-height: 50px; }
        .success, .error, .info { padding: 15px; border-radius: 10px; margin-top: 10px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #cce5ff; color: #004085; }
    </style>
</head>
<body>
    <div class="container">
        <h1>チーム分け作成</h1>
        <div class="controls"></div>
        <div class="button-group">
            <button class="btn-primary" onclick="loadFile()">📂 ファイル読み込み</button>
            <button class="btn-primary" onclick="createGroups()">👥 グループ作成</button>
            <button class="btn-secondary" onclick="shuffleGroups()">🔀 シャッフル</button>
            <button class="btn-secondary" onclick="clearAll()">🗑️ クリア</button>
        </div>
        <div id="message" class="message-box"></div>
        <div id="memberList"></div>
        <div class="groups-wrapper"><div id="groups"></div></div>
    </div>

    <script>
        let allMembers = [], excludedNames = [], leaderNames = [], buddyNames = [], currentGroups = [], factorHeaders = [];
        let clickTimeout = null, clickCount = 0;

        // --- 1. UI & Event Handling ---
        function handleMemberClick(name) {
            clickCount++;
            if (clickTimeout) clearTimeout(clickTimeout);
            clickTimeout = setTimeout(() => {
                if (clickCount === 1) toggleLeader(name);
                else if (clickCount === 2) toggleExclude(name);
                else if (clickCount === 3) toggleBuddy(name);
                else if (clickCount >= 4) {
                    resetMemberState(name);
                    displayMembers();
                }
                clickCount = 0;
            }, 300);
        }
        function toggleLeader(name) { resetMemberState(name); toggleInArray(leaderNames, name); displayMembers(); }
        function toggleExclude(name) { resetMemberState(name); toggleInArray(excludedNames, name); displayMembers(); }
        function toggleBuddy(name) { resetMemberState(name); toggleInArray(buddyNames, name); displayMembers(); }
        function resetMemberState(name) {
            [leaderNames, excludedNames, buddyNames].forEach(arr => {
                const index = arr.indexOf(name);
                if (index > -1) arr.splice(index, 1);
            });
        }
        function createMemberHTML(member) {
            const tags = [];
            tags.push(`<span class="tag tag-${member.gender === '男' ? 'male' : 'female'}">${member.gender}</span>`);
            tags.push(`<span class="tag tag-${member.grade === '1年' ? 'grade1' : 'grade-other'}">${member.grade}</span>`);
            if (member.participation.includes('運動会')) tags.push(`<span class="tag tag-sports">運動会</span>`);
            if (member.participation.includes('後夜祭')) tags.push(`<span class="tag tag-festival">後夜祭</span>`);
            const dots = member.factors.map((selected, i) => selected ? `<div class="factor-dot factor-dot-${i % 5}"></div>` : '').join('');
            return `<span class="member-name">${member.name}</span><div class="member-tags">${tags.join('')}</div><div class="factor-dots">${dots}</div>`;
        }
        function displayMembers() {
            const memberListDiv = document.getElementById('memberList');
            if (allMembers.length === 0) { memberListDiv.innerHTML = ''; return; }
            memberListDiv.innerHTML = `<div class="member-list-container"><h3>📋 全メンバー (${allMembers.length}人)</h3>
                <p>1回:リーダー, 2回:除外, 3回:同一グループ, 4回:クリア</p>
                <div class="members">${allMembers.map(member => {
                let classes = 'member';
                if (excludedNames.includes(member.name)) classes += ' excluded';
                if (leaderNames.includes(member.name)) classes += ' leader-candidate';
                if (buddyNames.includes(member.name)) classes += ' buddy-candidate';
                return `<div class="${classes}" onmousedown="handleMemberClick('${member.name.replace(/'/g, "\\'")}')">${createMemberHTML(member)}</div>`;
            }).join('')}</div></div>`;
        }
        function displayGroups() {
            const groupsDiv = document.getElementById('groups');
            groupsDiv.innerHTML = currentGroups.map((group, groupIndex) => {
                const maleCount = group.members.filter(m => m.gender === '男').length;
                const grade1Count = group.members.filter(m => m.grade === '1年').length;
                // ▼▼▼【修正点】ファイル内の文字列と完全に一致させて正しくカウントする ▼▼▼
                const sportsCount = group.members.filter(m => m.participation === '両方参加' || m.participation === '運動会だけ参加').length;
                const festivalCount = group.members.filter(m => m.participation === '両方参加' || m.participation === '後夜祭だけ参加').length;
                const stats = `男:${maleCount} 女:${group.members.length - maleCount} | 1年:${grade1Count} 他:${group.members.length - grade1Count}<br>運動会:${sportsCount}人 | 後夜祭:${festivalCount}人`;
                
                const membersHTML = group.members.map((member, memberIndex) => {
                    const isFixed = leaderNames.includes(member.name) || buddyNames.includes(member.name);
                    const draggable = !isFixed;
                    return `<div 
                        class="member group-member ${group.leader === member.name ? 'leader' : ''}" 
                        draggable="${draggable}" 
                        ondragstart="${draggable ? `handleDragStart(event, ${groupIndex}, ${memberIndex})` : ''}"
                        ondragend="handleDragEnd(event)"
                    >${createMemberHTML(member)}</div>`;
                }).join('');

                return `<div 
                    class="group" 
                    data-group-index="${groupIndex}"
                    ondragover="handleDragOver(event)" 
                    ondragenter="handleDragEnter(event)"
                    ondragleave="handleDragLeave(event)"
                    ondrop="handleDrop(event)"
                >
                    <h3>${group.name} (${group.members.length}人)</h3>
                    <div class="group-stats">${stats}</div>
                    <div class="group-members">${membersHTML}</div>
                </div>`;
            }).join('');
        }

        // --- 2. Group Creation Algorithm ---
        async function createGroups() {
            if (allMembers.length === 0) return showMessage('先にファイルを読み込んでください。', 'error');
            const groupCount = parseInt(document.getElementById('groupCount').value);
            if (!groupCount || groupCount < 1) return showMessage('グループ数は1以上にしてください。', 'error');
            const initialAvailable = allMembers.filter(m => !excludedNames.includes(m.name));
            if (groupCount > initialAvailable.length) return showMessage('グループ数がメンバー数を超えています。', 'error');

            showMessage('最終アルゴリズムでグループ分けを開始します...', 'info');
            await new Promise(resolve => setTimeout(resolve, 50));

            const baseSize = Math.floor(initialAvailable.length / groupCount);
            const remainder = initialAvailable.length % groupCount;
            currentGroups = Array.from({ length: groupCount }, (_, i) => ({ name: `グループ ${i + 1}`, members: [], leader: null, maxSize: baseSize + (i < remainder ? 1 : 0) }));
            const totalStats = calculateTotalStats(initialAvailable, groupCount);

            let leaders = initialAvailable.filter(m => leaderNames.includes(m.name));
            let buddies = initialAvailable.filter(m => buddyNames.includes(m.name));
            let regularMembers = initialAvailable.filter(m => !leaderNames.includes(m.name) && !buddyNames.includes(m.name));

            if (leaders.length > groupCount) return showMessage(`エラー: リーダーの数(${leaders.length}人)がグループ数(${groupCount})を超えています。`, 'error');
            shuffleArray(leaders).forEach((leader, i) => { currentGroups[i].members.push(leader); currentGroups[i].leader = leader.name; });

            const group1 = currentGroups[0] || { members: [], maxSize: 0 }; // 安全対策
            if (buddies.length > (group1.maxSize - group1.members.length)) return showMessage(`エラー: 同一グループ指定者の数(${buddies.length}人)がグループ1の残り枠を超えています。`, 'error');
            buddies.forEach(buddy => group1.members.push(buddy));

            regularMembers.sort((a,b) => (b.factors.filter(f=>f).length + (b.participation.includes('だけ')?1:0)) - (a.factors.filter(f=>f).length + (a.participation.includes('だけ')?1:0)));
            regularMembers.forEach(member => { const bestGroup = findBestGroup(member, currentGroups, totalStats); if (bestGroup) bestGroup.members.push(member); });
            
            for (let i = 0; i < 2000; i++) optimizeBySwapping(currentGroups, totalStats);

            showMessage(`グループ分けが完了しました。`, 'success');
            displayGroups();
        }

        // --- Algorithm Helper Functions ---
        function findBestGroup(member, groups, totalStats) {
            const availableGroups = groups.filter(g => g.members.length < g.maxSize);
            if (availableGroups.length === 0) return null;
            let bestGroup = null, minPenalty = Infinity;
            for (const group of availableGroups) {
                const penalty = calculatePlacementPenalty(member, group, totalStats);
                if (penalty < minPenalty) { minPenalty = penalty; bestGroup = group; }
            }
            return bestGroup;
        }
        function calculatePlacementPenalty(member, group, totalStats) {
            const WEIGHTS = { FACTOR: 100, PARTICIPATION: 100, SUBSET_SIZE: 10, DEMOGRAPHIC: 1 };
            let penalty = 0;
            if (member.participation.includes('だけ')) { penalty += WEIGHTS.PARTICIPATION * group.members.filter(m => m.participation === member.participation).length; }
            member.factors.forEach((isSelected, i) => { if (isSelected) penalty += WEIGHTS.FACTOR * group.members.filter(m => m.factors[i]).length; });
            const currentPenalty = calculateGroupSubPenalty(group, totalStats);
            group.members.push(member);
            const futurePenalty = calculateGroupSubPenalty(group, totalStats);
            group.members.pop();
            penalty += (futurePenalty - currentPenalty);
            return penalty;
        }
        function calculateGroupSubPenalty(group, totalStats) {
            const WEIGHTS = { SUBSET_SIZE: 10, DEMOGRAPHIC: 1 };
            let penalty = 0;
            // ▼▼▼【修正点】アルゴリズムの計算も表示と一致させる ▼▼▼
            const sportsMembers = group.members.filter(m => m.participation === '両方参加' || m.participation === '運動会だけ参加');
            const festivalMembers = group.members.filter(m => m.participation === '両方参加' || m.participation === '後夜祭だけ参加');
            penalty += WEIGHTS.SUBSET_SIZE * Math.pow(sportsMembers.length - totalStats.targetSports, 2);
            penalty += WEIGHTS.SUBSET_SIZE * Math.pow(festivalMembers.length - totalStats.targetFestival, 2);
            penalty += WEIGHTS.DEMOGRAPHIC * (calculateDemographicPenaltyForSubset(group.members) + calculateDemographicPenaltyForSubset(sportsMembers) + calculateDemographicPenaltyForSubset(festivalMembers));
            return penalty;
        }
        function calculateDemographicPenaltyForSubset(subset) {
            if (subset.length < 2) return 0;
            const maleRatio = subset.filter(m => m.gender === '男').length / subset.length;
            const grade1Ratio = subset.filter(m => m.grade === '1年').length / subset.length;
            return Math.pow(maleRatio - 0.5, 2) + Math.pow(grade1Ratio - 0.5, 2);
        }
        function optimizeBySwapping(groups, totalStats) {
            if (groups.length < 2) return;
            const g1 = groups[Math.floor(Math.random()*groups.length)], g2 = groups[Math.floor(Math.random()*groups.length)];
            if (g1===g2 || g1.members.length===0 || g2.members.length===0 || g1.maxSize !== g2.maxSize) return;
            const m1_idx = Math.floor(Math.random()*g1.members.length), m2_idx = Math.floor(Math.random()*g2.members.length);
            const m1 = g1.members[m1_idx], m2 = g2.members[m2_idx];
            if ([...leaderNames, ...buddyNames].includes(m1.name) || [...leaderNames, ...buddyNames].includes(m2.name)) return;
            const currentPenalty = calculateGroupSubPenalty(g1, totalStats) + calculateGroupSubPenalty(g2, totalStats);
            g1.members[m1_idx] = m2; g2.members[m2_idx] = m1;
            const newPenalty = calculateGroupSubPenalty(g1, totalStats) + calculateGroupSubPenalty(g2, totalStats);
            if (newPenalty >= currentPenalty) { g1.members[m1_idx] = m1; g2.members[m2_idx] = m2; }
        }
        function calculateTotalStats(members, groupCount) {
             // ▼▼▼【修正点】アルゴリズムの計算も表示と一致させる ▼▼▼
            const sports = members.filter(m => m.participation === '両方参加' || m.participation === '運動会だけ参加').length;
            const festival = members.filter(m => m.participation === '両方参加' || m.participation === '後夜祭だけ参加').length;
            return { targetSports: sports / groupCount, targetFestival: festival / groupCount };
        }

        // --- Drag & Drop Handlers ---
        function handleDragStart(event, groupIndex, memberIndex) {
            event.dataTransfer.setData('text/plain', JSON.stringify({ groupIndex, memberIndex }));
            setTimeout(() => event.target.classList.add('dragging'), 0);
        }
        function handleDragEnd(event) {
            event.target.classList.remove('dragging');
        }
        function handleDragOver(event) {
            event.preventDefault();
        }
        function handleDragEnter(event) {
            const targetGroup = event.target.closest('.group');
            if (targetGroup) targetGroup.classList.add('drag-over');
        }
        function handleDragLeave(event) {
            const targetGroup = event.target.closest('.group');
            if (targetGroup) targetGroup.classList.remove('drag-over');
        }
        function handleDrop(event) {
            event.preventDefault();
            const targetGroupElement = event.target.closest('.group');
            if (!targetGroupElement) return;
            targetGroupElement.classList.remove('drag-over');

            const sourceData = JSON.parse(event.dataTransfer.getData('text/plain'));
            const targetGroupIndex = parseInt(targetGroupElement.dataset.groupIndex);

            if (sourceData.groupIndex === targetGroupIndex) return;

            const sourceGroup = currentGroups[sourceData.groupIndex];
            const targetGroup = currentGroups[targetGroupIndex];
            const movedMember = sourceGroup.members.splice(sourceData.memberIndex, 1)[0];
            targetGroup.members.push(movedMember);

            displayGroups();
            showMessage('メンバーを移動しました。', 'info');
        }

        // --- Utility Functions ---
        function shuffleGroups() { if (currentGroups.length === 0) return showMessage('先にグループを作成してください。', 'error'); createGroups(); }
        function showMessage(message, type = 'success') { const d=document.getElementById('message');d.innerHTML=`<div class="${type}">${message}</div>`;setTimeout(()=>d.innerHTML='',5000) }
        function shuffleArray(array){for(let i=array.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[array[i],array[j]]=[array[j],array[i]]}return array}
        function toggleInArray(array, item) { const index=array.indexOf(item); index > -1 ? array.splice(index,1) : array.push(item); }
        function clearAll(fullClear=true){if(fullClear){allMembers=[]; const fileInput = document.getElementById('fileInput'); if(fileInput) fileInput.value='';}excludedNames=[];leaderNames=[];buddyNames=[];currentGroups=[];document.getElementById('memberList').innerHTML='';document.getElementById('groups').innerHTML='';if(fullClear)showMessage('すべてクリアしました。')}
        function loadFile(){const i=document.getElementById('fileInput').files[0];if(!i)return showMessage('ファイルを選択してください。','error');const r=new FileReader();r.onload=function(e){try{const text = e.target.result.replace(/\r\n/g, '\n').replace(/\r/g, '\n');const l=text.split('\n').filter(Boolean);if(l.length<2)throw new Error("ヘッダー+データが必要です。");const h=l[0].trim().split(',');if(h.indexOf('名簿')===-1)throw new Error("ヘッダーに「名簿」がありません。");factorHeaders=h.filter(h=>h.startsWith('調整要因'));allMembers=l.slice(1).map(line=>{const d=line.trim().split(',');const m={name:d[h.indexOf('名簿')],participation:d[h.indexOf('参加形式')],grade:d[h.indexOf('学年')],gender:d[h.indexOf('性別')],factors:factorHeaders.map(fh=>d[h.indexOf(fh)]==='選択')};return m.name?m:null}).filter(Boolean);if(allMembers.length===0)throw new Error("有効なメンバーが見つかりません。");showMessage(`${allMembers.length}人読込(調整要因${factorHeaders.length}個)`,'success');clearAll(false);displayMembers()}catch(err){showMessage(`ファイルエラー:${err.message}`,'error');allMembers=[];displayMembers()}};r.onerror=function(){showMessage('ファイルの読込に失敗。','error');};r.readAsText(i,'UTF-8')}
        document.querySelector('.controls').innerHTML=`<div class="control-group"><label for="fileInput">名簿ファイル(.txt,csv)</label><input type="file"id="fileInput"accept=".txt,.csv"></div><div class="control-group"><label for="groupCount">グループ数</label><input type="number"id="groupCount"min="1"value="3"></div>`;
    </script>
</body>
</html>
