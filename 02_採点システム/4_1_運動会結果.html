<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>運動会 得点計算ツール</title>
    <style>
        :root {
            --primary-color-start: #007bff; --primary-color-end: #0056b3;
            --secondary-color-start: #6c757d; --secondary-color-end: #5a6268;
            --background-gradient-start: #f4f6f9; --background-gradient-end: #e9edf2;
            --container-bg: #ffffff; --text-color: #333;
            --heading-color-start: #3a3a3a; --heading-color-end: #111;
            --border-color: #dee2e6;
            --match-row-bg: #fafcff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background: linear-gradient(135deg, var(--background-gradient-start) 0%, var(--background-gradient-end) 100%);
            min-height: 100vh; padding: 20px; color: var(--text-color);
        }
        .container {
            max-width: 95%; width: 1200px; margin: 0 auto; background: var(--container-bg);
            border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); padding: 30px;
        }
        h1 {
            text-align: center; margin-bottom: 30px; font-size: 2.5em;
            background: linear-gradient(135deg, var(--heading-color-start), var(--heading-color-end));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .grid-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px; margin-bottom: 20px; padding: 25px;
            background: #f8f9fa; border-radius: 15px;
        }
        .control-group { display: flex; flex-direction: column; }
        .control-group label { margin-bottom: 8px; font-weight: 600; color: #555; }
        .control-group input {
            padding: 10px; border: 1px solid var(--border-color); border-radius: 8px;
            transition: border-color 0.3s;
        }
        .control-group input:focus { outline: none; border-color: var(--primary-color-start); }
        .button-group {
            display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin: 25px 0;
        }
        button {
            padding: 12px 25px; border: none; border-radius: 25px; font-size: 16px;
            font-weight: 600; cursor: pointer; transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color-start), var(--primary-color-end));
            color: white;
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(0, 123, 255, 0.4); }
        .btn-secondary {
            background: linear-gradient(135deg, #cfd9df, #e2ebf0); color: #333;
        }
        .btn-secondary:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(207, 217, 223, 0.5); }
        .message-box { min-height: 50px; text-align: center; }
        .message {
            padding: 15px; border-radius: 10px; margin: 10px auto; display: inline-block;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }

        .scoring-table-container { overflow-x: auto; }
        .scoring-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .scoring-table th, .scoring-table td {
            padding: 12px; text-align: center; border: 1px solid var(--border-color);
        }
        .scoring-table th { background-color: #f2f2f2; font-weight: 600; }
        .scoring-table input[type="text"] { width: calc(100% - 110px); }
        .scoring-table input, .scoring-table select {
            padding: 8px; border-radius: 5px; border: 1px solid #ccc;
        }
        .event-header-cell { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .match-count-input { width: 70px; text-align: center; }
        
        .match-row td { background-color: var(--match-row-bg); }
        .match-label { padding-right: 15px; font-style: italic; color: #555; text-align: right; }

        #results { margin-top: 30px; }
        .result-box { background: #f8f9fa; padding: 20px; border-radius: 12px; }
        .result-box h3 {
            border-bottom: 2px solid var(--primary-color-start); padding-bottom: 10px;
            margin-bottom: 15px; text-align: center; font-size: 1.5em;
        }
        .result-box ol { list-style: none; padding: 0; }
        .result-box li {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 5px; border-bottom: 1px solid #eee; font-size: 1.2em;
        }
        .result-box li:last-child { border-bottom: none; }
        .result-box .rank { font-weight: bold; min-width: 50px; }
        .result-box .team-name { flex-grow: 1; }
        .result-box .score { font-weight: bold; color: var(--primary-color-end); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 運動会 得点計算ツール</h1>

        <div class="grid-container">
            <div class="control-group">
                <label for="fileInput">📂 データ読込 (.txt)</label>
                <input type="file" id="fileInput" accept=".txt" onchange="loadFile()">
            </div>
        </div>

        <div class="grid-container">
            <div class="control-group">
                <label for="totalPoints">🎯 総得点</label>
                <input type="number" id="totalPoints" placeholder="例: 600" value="600">
            </div>
            <div class="control-group">
                <label for="numTeams">🚩 チーム数</label>
                <input type="number" id="numTeams" placeholder="例: 4" value="4">
            </div>
            <div class="control-group">
                <label for="numEvents">👟 種目数</label>
                <input type="number" id="numEvents" placeholder="例: 6" value="6">
            </div>
        </div>

        <div class="button-group">
            <button class="btn-primary" onclick="setup()">⚙️ 設定を開始</button>
        </div>

        <div id="message" class="message-box"></div>
        <div id="team-names-container"></div>
        <div id="scoring-table-container"></div>

        <div id="main-actions" style="display: none;">
            <div class="button-group">
                <button class="btn-primary" onclick="calculateScores(true)">📊 最終結果を計算</button>
                <button class="btn-primary" onclick="exportFile()">💾 保存</button>
                <button class="btn-secondary" onclick="clearAll()">🗑️ 全てクリア</button>
            </div>
        </div>

        <div id="results"></div>
    </div>

    <script>
        let pointDistribution = [];
        let numTeams = 0;
        let numEvents = 0;
        let finalResultsData = [];

        function showMessage(message, type = 'info') {
            const messageDiv = document.getElementById('message');
            messageDiv.innerHTML = `<div class="message ${type}">${message}</div>`;
        }
        
        function setup() {
            numTeams = parseInt(document.getElementById('numTeams').value) || 0;
            numEvents = parseInt(document.getElementById('numEvents').value) || 0;
            const totalPoints = parseInt(document.getElementById('totalPoints').value) || 0;

            if (numTeams <= 0 || totalPoints <= 0 || numEvents <= 0) {
                return showMessage('総得点、チーム数、種目数は1以上の数値を入力してください。', 'error');
            }

            const pointsPerEvent = totalPoints / numEvents;
            const sumOfRanks = numTeams * (numTeams + 1) / 2;
            if(sumOfRanks === 0) return showMessage('チーム数が0のため計算できません。', 'error');
            const baseUnit = pointsPerEvent / sumOfRanks;

            pointDistribution = [];
            for (let i = 1; i <= numTeams; i++) {
                pointDistribution.push((numTeams - i + 1) * baseUnit);
            }
            
            generateTeamInputs();
            generateScoringTable();
            document.getElementById('main-actions').style.display = 'block';
            document.getElementById('results').innerHTML = '';
        }

        function generateTeamInputs() {
            const container = document.getElementById('team-names-container');
            let html = '<h3>チーム名</h3><div class="grid-container">';
            for(let i=0; i<numTeams; i++) {
                html += `
                    <div class="control-group">
                        <label for="teamName${i}">チーム ${i + 1}</label>
                        <input type="text" id="teamName${i}" onkeyup="updateTeamHeaders()" placeholder="チーム名を入力">
                    </div>`;
            }
            html += '</div>';
            container.innerHTML = html;
        }

        function generateScoringTable() {
            const container = document.getElementById('scoring-table-container');
            let tableHTML = '<h3>順位入力</h3><div class="scoring-table-container"><table class="scoring-table"><thead><tr><th>種目 / 試合数</th>';
            for (let i = 0; i < numTeams; i++) {
                tableHTML += `<th id="headerTeam${i}">チーム ${i + 1}</th>`;
            }
            tableHTML += '</tr></thead><tbody id="events-body">';

            for(let i=0; i<numEvents; i++) {
                tableHTML += `
                    <tr class="event-header-row" data-event-id="${i}">
                        <td class="event-header-cell">
                            <input type="text" class="eventName" placeholder="種目 ${i+1} の名前">
                            <label>試合数: <input type="number" value="1" min="1" class="match-count-input" oninput="updateMatches(this)"></label>
                        </td>
                        <td colspan="${numTeams}"></td>
                    </tr>`;
            }
            tableHTML += '</tbody></table></div>';
            container.innerHTML = tableHTML;
            document.querySelectorAll('.match-count-input').forEach(updateMatches);
            updateTeamHeaders();
        }
        
        function updateMatches(inputElement) {
            const headerRow = inputElement.closest('.event-header-row');
            const eventId = headerRow.dataset.eventId;
            const desiredMatches = parseInt(inputElement.value) || 1;
            
            headerRow.parentElement.querySelectorAll(`.match-row[data-event-id="${eventId}"]`).forEach(row => row.remove());

            if (desiredMatches > 0) {
                 headerRow.querySelectorAll('td')[1].style.display = desiredMatches === 1 ? 'none' : 'table-cell';
            }

            let lastRow = headerRow;
            for (let i = 1; i <= desiredMatches; i++) {
                const newRow = document.createElement('tr');
                newRow.className = 'match-row';
                newRow.dataset.eventId = eventId;
                
                let rowContent = `<td class="match-label">第${i}試合</td>`;
                const rankOptions = ['<option value="0">未選択</option>'];
                for (let r = 1; r <= numTeams; r++) {
                    rankOptions.push(`<option value="${r}">${r}位</option>`);
                }

                for (let j = 0; j < numTeams; j++) {
                    rowContent += `<td><select class="rank-select" onchange="calculateScores()">${rankOptions.join('')}</select></td>`;
                }
                newRow.innerHTML = rowContent;
                lastRow.after(newRow);
                lastRow = newRow;
            }
            calculateScores();
        }
        
        function updateTeamHeaders() {
            for (let i = 0; i < numTeams; i++) {
                const teamNameInput = document.getElementById(`teamName${i}`);
                if (teamNameInput) {
                   const teamName = teamNameInput.value || `チーム ${i + 1}`;
                   const header = document.getElementById(`headerTeam${i}`);
                   if(header) header.textContent = teamName;
                }
            }
        }

        // ▼▼▼【修正点】計算結果の `teamScores` を返すように変更 ▼▼▼
        function calculateScores(isFinal = false) {
            let teamScores = {};
            try {
                if (numTeams === 0) return null;
                const teamNames = [];
                for (let i = 0; i < numTeams; i++) {
                    const name = document.getElementById(`teamName${i}`).value.trim();
                    if (isFinal && !name) {
                        throw new Error(`チーム ${i + 1} の名前を入力してください。`);
                    }
                    teamNames.push(name || `チーム ${i+1}`);
                }
                if (isFinal && (new Set(teamNames)).size !== teamNames.length) {
                    throw new Error('チーム名が重複しています。');
                }

                teamScores = Object.fromEntries(teamNames.map(name => [name, 0]));

                document.querySelectorAll('.event-header-row').forEach(headerRow => {
                    const eventId = headerRow.dataset.eventId;
                    const matchCount = parseInt(headerRow.querySelector('.match-count-input').value) || 1;
                    const scaledPointDistribution = pointDistribution.map(p => p / matchCount);
                    
                    const matchRows = document.querySelectorAll(`.match-row[data-event-id="${eventId}"]`);
                    
                    matchRows.forEach(matchRow => {
                        const selects = matchRow.querySelectorAll('.rank-select');
                        const ranksForEvent = Array.from(selects).map((sel, index) => ({
                            teamIndex: index,
                            rank: parseInt(sel.value)
                        })).filter(item => item.rank > 0);

                        if (isFinal && ranksForEvent.length < numTeams) {
                            const eventName = headerRow.querySelector('input.eventName').value || `種目 ${parseInt(eventId) + 1}`;
                            throw new Error(`「${eventName}」の全ての順位を選択してください。`);
                        }
                        if(ranksForEvent.length === 0) return;
                        
                        ranksForEvent.sort((a, b) => a.rank - b.rank);
                        
                        let rankIndex = 0;
                        while (rankIndex < ranksForEvent.length) {
                            const currentRank = ranksForEvent[rankIndex].rank;
                            const tieGroup = ranksForEvent.filter(r => r.rank === currentRank);
                            
                            let pointsToShare = 0;
                            for (let j = 0; j < tieGroup.length; j++) {
                                if (rankIndex + j < scaledPointDistribution.length) {
                                    pointsToShare += scaledPointDistribution[rankIndex + j];
                                }
                            }
                            const pointsPerTeam = tieGroup.length > 0 ? pointsToShare / tieGroup.length : 0;
                            
                            tieGroup.forEach(tiedTeam => {
                                const teamName = teamNames[tiedTeam.teamIndex];
                                teamScores[teamName] += pointsPerTeam;
                            });
                            rankIndex += tieGroup.length;
                        }
                    });
                });
                displayResults(teamScores, isFinal);
                return teamScores; // 成功時に計算結果を返す
            } catch (err) {
                if (isFinal) {
                    showMessage(err.message, 'error');
                }
                return null; // エラー時にnullを返す
            }
        }

        function displayResults(scores, isFinal) {
            if (!scores) return; // scoresがnullなら何もしない

            const resultsContainer = document.getElementById('results');
            const sortedTeams = Object.entries(scores).sort(([, a], [, b]) => b - a);
            
            finalResultsData = [];
            let html = `<div class="result-box"><h3>${isFinal ? '最終結果' : '中間結果'}</h3><ol>`;
            
            let lastScore = -1;
            let currentRank = 0;
            sortedTeams.forEach(([name, score], index) => {
                if (score !== lastScore) {
                    currentRank = index + 1;
                }
                const rankText = `🏅 ${currentRank}位`;
                html += `
                    <li>
                        <span class="rank">${rankText}</span>
                        <span class="team-name">${name}</span>
                        <span class="score">${score.toLocaleString(undefined, { maximumFractionDigits: 2 })} 点</span>
                    </li>`;
                
                if (isFinal) {
                    finalResultsData.push({ rank: currentRank, name: name, score: score });
                }
                lastScore = score;
            });

            html += `</ol></div>`;
            resultsContainer.innerHTML = html;
            if (isFinal) {
                showMessage('最終結果の計算が完了しました！', 'success');
                resultsContainer.scrollIntoView({ behavior: 'smooth' });
            }
        }
        
        // ▼▼▼【修正点】サンプル形式に合わせてファイル出力ロジックを変更 ▼▼▼
        function exportFile() {
            if (numTeams === 0) return showMessage('保存するデータがありません。「設定を開始」してください。', 'error');
            
            // 保存時点での現在の得点を計算
            const currentScores = calculateScores(false);
            if (!currentScores) return showMessage('得点の計算中にエラーが発生しました。', 'error');

            try {
                let content = `総得点: ${document.getElementById('totalPoints').value}\n`;
                const teamNames = Array.from(document.querySelectorAll('[id^="teamName"]')).map(input => input.value);
                content += `チーム名: ${teamNames.join(', ')}\n`;
                
                // 得点行を追加
                const scoresInOrder = teamNames.map(name => {
                    const score = currentScores[name] || 0;
                    return score.toLocaleString(undefined, { maximumFractionDigits: 2 });
                });
                content += `得点: ${scoresInOrder.join(',')}\n`;

                const eventNames = Array.from(document.querySelectorAll('input.eventName')).map(input => input.value);
                content += `種目名: ${eventNames.join(', ')}\n`;

                if (finalResultsData.length > 0) {
                    content += "\n//----- 最終結果 -----\n";
                    finalResultsData.forEach(result => {
                        const scoreFormatted = result.score.toLocaleString(undefined, { maximumFractionDigits: 2 });
                        content += `${result.rank}位: ${result.name} (${scoreFormatted}点)\n`;
                    });
                    content += "//------------------\n\n";
                } else {
                    content += "\n";
                }

                document.querySelectorAll('.event-header-row').forEach(headerRow => {
                    const eventId = headerRow.dataset.eventId;
                    const eventName = headerRow.querySelector('.eventName').value;
                    const matchCount = parseInt(headerRow.querySelector('.match-count-input').value) || 1;
                    
                    if (matchCount === 1) {
                        // 試合数1の場合: [種目名] 1,2,3,4
                        const matchRow = document.querySelector(`.match-row[data-event-id="${eventId}"]`);
                        const ranks = Array.from(matchRow.querySelectorAll('.rank-select')).map(sel => sel.value);
                        content += `[${eventName}] ${ranks.join(',')}\n`;
                    } else {
                        // 試合数2以上の場合: 従来の形式
                        content += `[${eventName}]\n`;
                        content += `試合数: ${matchCount}\n`;
                        const matchRows = document.querySelectorAll(`.match-row[data-event-id="${eventId}"]`);
                        matchRows.forEach((matchRow, matchIndex) => {
                            const ranks = Array.from(matchRow.querySelectorAll('.rank-select')).map(sel => sel.value);
                            content += `試合${matchIndex + 1}: ${ranks.join('\t')}\n`;
                        });
                        content += "\n";
                    }
                });

                const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'score_data.txt';
                a.click();
                URL.revokeObjectURL(a.href);
            } catch (err) {
                showMessage(`保存に失敗しました: ${err.message}`, 'error');
            }
        }

        // ▼▼▼【修正点】サンプル形式の読み込みに対応 ▼▼▼
        function loadFile() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const lines = e.target.result.split('\n');
                    let loadedTotalPoints, loadedTeamNames, loadedEventNames;
                    const loadedData = new Map();
                    let currentEvent = null;

                    lines.forEach(line => {
                        line = line.trim();
                        if (line.startsWith('//')) return; // 最終結果は無視
                        if (line.startsWith('得点:')) return; // 得点行も無視 (自動計算するため)

                        if (line.startsWith('総得点:')) loadedTotalPoints = line.substring('総得点:'.length).trim();
                        else if (line.startsWith('チーム名:')) loadedTeamNames = line.substring('チーム名:'.length).split(',').map(name => name.trim()).filter(Boolean);
                        else if (line.startsWith('種目名:')) loadedEventNames = line.substring('種目名:'.length).split(',').map(name => name.trim()).filter(Boolean);
                        else if (line.match(/^\[.*\]\s+[\d,]+$/)) {
                            // 新形式: [種目名] 1,2,3,4
                            const parts = line.split(']');
                            const eventName = parts[0].substring(1).trim();
                            const ranks = parts[1].trim().split(',');
                            loadedData.set(eventName, { matchCount: 1, matches: [ranks] });
                            currentEvent = null;
                        }
                        else if (line.match(/^\[.*\]$/)) {
                            // 旧形式(複数試合)の開始: [種目名]
                            currentEvent = line.substring(1, line.length - 1);
                            loadedData.set(currentEvent, { matchCount: 1, matches: [] });
                        } else if (currentEvent && line.startsWith('試合数:')) {
                            if(loadedData.has(currentEvent)) loadedData.get(currentEvent).matchCount = line.substring('試合数:'.length).trim();
                        } else if (currentEvent && line.match(/^試合\d+:/)) {
                            const ranks = line.split(':')[1].trim().split('\t');
                            if(loadedData.has(currentEvent)) loadedData.get(currentEvent).matches.push(ranks);
                        }
                    });
                    
                    if (!loadedTotalPoints || !loadedTeamNames || !loadedEventNames) throw new Error('ファイルの形式が正しくありません。');
                    
                    document.getElementById('totalPoints').value = loadedTotalPoints;
                    document.getElementById('numTeams').value = loadedTeamNames.length;
                    document.getElementById('numEvents').value = loadedEventNames.length;
                    setup();

                    loadedTeamNames.forEach((name, i) => { if (document.getElementById(`teamName${i}`)) document.getElementById(`teamName${i}`).value = name; });
                    updateTeamHeaders();

                    document.querySelectorAll('.event-header-row').forEach((headerRow, eventIndex) => {
                        const eventName = loadedEventNames[eventIndex];
                        headerRow.querySelector('.eventName').value = eventName;
                        if(loadedData.has(eventName)) {
                            const data = loadedData.get(eventName);
                            const matchInput = headerRow.querySelector('.match-count-input');
                            matchInput.value = data.matchCount;
                            updateMatches(matchInput);

                            const matchRows = document.querySelectorAll(`.match-row[data-event-id="${eventIndex}"]`);
                            data.matches.forEach((ranks, matchIndex) => {
                                if(matchRows[matchIndex]) {
                                    // 形式の違い（カンマ区切り vs タブ区切り）を吸収
                                    ranks.forEach((rank, teamIndex) => {
                                        if(matchRows[matchIndex].querySelectorAll('.rank-select')[teamIndex]) {
                                            matchRows[matchIndex].querySelectorAll('.rank-select')[teamIndex].value = rank;
                                        }
                                    });
                                }
                            });
                        }
                    });

                    calculateScores(true);
                    showMessage('ファイルの読み込みと状態の復元が完了しました。', 'success');
                } catch (err) {
                    showMessage(`ファイル読み込みエラー: ${err.message}`, 'error');
                    clearAll();
                }
            };
            reader.readAsText(file, 'UTF-8');
        }

        function clearAll() {
            document.getElementById('totalPoints').value = '600';
            document.getElementById('numTeams').value = '4';
            document.getElementById('numEvents').value = '6';
            document.getElementById('fileInput').value = '';
            document.getElementById('team-names-container').innerHTML = '';
            document.getElementById('scoring-table-container').innerHTML = '';
            document.getElementById('results').innerHTML = '';
            document.getElementById('main-actions').style.display = 'none';
            pointDistribution = [];
            finalResultsData = [];
            numTeams = 0; numEvents = 0;
            showMessage('全ての情報をクリアしました。', 'info');
        }
    </script>
</body>
</html>
